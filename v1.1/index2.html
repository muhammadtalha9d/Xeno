<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fff; }


        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }


        @keyframes wave {
            0%, 100% { transform: scaleY(0.6); opacity: 0.5; }
            50% { transform: scaleY(1.3); opacity: 1; }
        }
        .animate-wave {
            animation: wave 0.8s ease-in-out infinite;
        }


        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }


        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .loading-bar-progress {
            height: 100%;
            background: linear-gradient(to right, #468CFF, #FB76F9);
            width: 0%;
            animation: progress-grow 2s ease-in-out forwards;
        }
        @keyframes progress-grow { to { width: 100%; } }
    </style>
</head>
<body class="overflow-x-hidden relative">


    <!-- Hero Background Blur -->
    <div class="fixed inset-0 -z-10 opacity-[0.20] pointer-events-none"
         style="background: linear-gradient(145deg, #FFFFFF 20%, #468CFF 45%, #FB76F9 75%, #FFFFFF 100%); filter: blur(120px);">
    </div>


    <!-- HERO SECTION -->
    <section class="pt-20 pb-24 px-4 text-center max-w-5xl mx-auto">
        <h1 class="text-[48px] font-bold tracking-tight mb-6 text-slate-900 leading-[1.15]">
            Your Personal AI Assistant <br />
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-[#468CFF] to-[#FB76F9]">For All Your Files</span>
        </h1>
        <p class="max-w-2xl mx-auto text-lg md:text-xl text-slate-600 mb-12 leading-relaxed font-medium">
            XeNo interprets your PDFs, documents, and photos and turns them into instant answers, summaries, and insights.
        </p>
        <button class="flex items-center gap-3 px-10 py-5 text-lg font-bold text-white rounded-2xl transition-all shadow-2xl hover:scale-105 active:scale-95 mx-auto mb-16 bg-gradient-to-r from-[#468CFF] to-[#FB76F9] hover:shadow-blue-200/50">
            <i data-lucide="download" class="w-6 h-6"></i> Download the App
        </button>


        <!-- HERO INTERACTIVE ANIMATION BOX -->
        <div class="relative max-w-4xl mx-auto p-[2px] rounded-[2.6rem] overflow-hidden group shadow-2xl">
            <div class="absolute inset-0 bg-gradient-to-br from-[#FB76F9] via-[#468CFF] to-[#FB76F9] animate-gradient-xy opacity-30 group-hover:opacity-100 transition-opacity"></div>
            <div class="bg-[#F8F9FE] rounded-[2.5rem] relative aspect-[16/9] flex flex-col border border-white/20 overflow-hidden">
               
                <!-- Mock Header / Search Bar -->
                <div class="px-6 pt-6 text-left">
                    <div class="bg-white rounded-full p-2.5 shadow-sm border border-slate-200/60 flex items-center justify-between gap-3 relative">
                        <div class="flex items-center gap-2">
                            <button class="p-2 text-slate-300"><i data-lucide="plus" class="w-4.5 h-4.5"></i></button>
                            <div class="flex items-center gap-1 bg-slate-900 text-white px-3 py-1 rounded-full text-[10px] font-bold">
                                <i data-lucide="sparkles" class="w-3 h-3 text-[#FB76F9]"></i><span>AI Search</span>
                            </div>
                        </div>
                        <div id="hero-typing-bar" class="flex-1 text-sm font-medium text-slate-400 px-2 min-h-[20px]">Ask XeNo anything...</div>
                        <button class="bg-slate-900 text-white p-2 rounded-full shadow-lg"><i data-lucide="arrow-up-right" class="w-4 h-4"></i></button>
                    </div>
                </div>


                <!-- Display Canvas -->
                <div id="hero-display-area" class="flex-1 flex items-center justify-center p-8 relative overflow-hidden">
                    <!-- Dynamic sequences injected here -->
                </div>


                <!-- AI Intelligence Badge -->
                <div class="absolute bottom-6 right-6 glass text-slate-800 p-4 rounded-2xl shadow-xl flex items-center gap-4 z-20 border border-white/50 transition-all hover:scale-105">
                    <div class="p-2.5 rounded-xl text-white shadow-sm bg-gradient-to-br from-[#468CFF] to-[#FB76F9]">
                        <i data-lucide="sparkles" class="w-[18px] h-[18px]"></i>
                    </div>
                    <div class="pr-1 text-left">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">AI Intelligence</p>
                        <p class="text-sm font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500">Cross-platform Retrieval</p>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <script>
        let heroStep = 0;
        let typingInterval = null;
        const blue = "#468CFF", pink = "#FB76F9";
        const typingBar = document.getElementById('hero-typing-bar');
        const displayArea = document.getElementById('hero-display-area');
       
        const heroPrompts = {
            1: "Xeno, what was the Q3 marketing spend breakdown?",
            6: "Xeno find pictures of dog"
        };


        function typeEffect(target, text) {
            if (typingInterval) clearInterval(typingInterval);
            target.textContent = '';
            let i = 0;
            typingInterval = setInterval(() => {
                if (i < text.length) target.textContent += text.charAt(i++);
                else clearInterval(typingInterval);
            }, 30);
        }


        function renderHero() {
            // Typing Logic
            if (heroStep === 1 || heroStep === 6) {
                typeEffect(typingBar, heroPrompts[heroStep]);
            } else if (heroStep === 0 || heroStep === 5) {
                typingBar.textContent = 'Ask XeNo anything...';
            } else if (heroStep >= 2 && heroStep <= 4) {
                typingBar.textContent = heroPrompts[1];
            } else if (heroStep >= 7) {
                typingBar.textContent = heroPrompts[6];
            }


            let html = '';
           
            // 0 & 5: Listening
            if (heroStep === 0 || heroStep === 5) {
                html = `
                <div class="flex flex-col items-center gap-8 animate-in fade-in duration-700">
                    <div class="bg-white py-4 px-8 rounded-full shadow-2xl glass flex flex-col items-start gap-2 relative">
                        <div class="flex items-center gap-2 h-8">
                            ${Array(14).fill(0).map((_,i)=>`
                                <div class="w-1.5 rounded-full animate-wave" style="height:${30 + (i % 3 * 20)}%; animation-delay:${i*0.08}s; background:${i%2===0?blue:pink}"></div>
                            `).join('')}
                        </div>
                        <span class="text-sm font-bold text-slate-800 tracking-tight">XeNo Listening...</span>
                    </div>
                    <div class="w-24 h-24 rounded-full flex items-center justify-center text-white shadow-xl relative" style="background:linear-gradient(135deg, ${pink}, ${blue})">
                        <div class="absolute inset-0 rounded-full animate-ping opacity-20" style="background-color:${pink}"></div>
                        <i data-lucide="mic" class="w-10 h-10"></i>
                    </div>
                </div>`;
            }
            // 1 & 6: Typing (Empty Card)
            else if (heroStep === 1 || heroStep === 6) {
                html = ``;
            }
            // 2 & 7: Searching/Indexing
            else if (heroStep === 2 || heroStep === 7) {
                if (heroStep === 2) {
                    html = `
                    <div class="flex flex-col items-center gap-6 animate-in zoom-in-95 duration-500">
                        <div class="relative"><i data-lucide="loader-2" class="w-16 h-16 text-blue-500 animate-spin"></i><i data-lucide="sparkles" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-pink-400 w-6 h-6"></i></div>
                        <p class="text-lg font-bold text-slate-500 animate-pulse uppercase tracking-widest">Searching Across Files...</p>
                    </div>`;
                } else {
                    html = `
                    <div class="flex flex-col items-center gap-6 animate-in zoom-in-95 duration-500">
                        <div class="loading-bar-container"><div class="loading-bar-progress"></div></div>
                        <p class="text-lg font-bold text-slate-500 uppercase tracking-widest">Indexing Image Library...</p>
                    </div>`;
                }
            }
            // 3 & 4: File Results
            else if (heroStep === 3 || heroStep === 4) {
                html = `
                <div class="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-4 text-left animate-in slide-in-from-bottom-8 duration-700">
                    <div class="flex items-center gap-4 p-6 bg-white border border-slate-100 rounded-[2rem] shadow-xl hover:scale-105 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center shadow-sm"><i data-lucide="file-text" class="w-6 h-6"></i></div>
                        <div class="flex-1">
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter mb-0.5">Finance Doc</p>
                            <div class="font-bold text-slate-800 text-sm">Q3_Budget_Summary.pdf</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-6 bg-white border border-slate-100 rounded-[2rem] shadow-xl hover:scale-105 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center shadow-sm"><i data-lucide="file-spreadsheet" class="w-6 h-6"></i></div>
                        <div class="flex-1">
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter mb-0.5">Spreadsheet</p>
                            <div class="font-bold text-slate-800 text-sm">Marketing_Ad_Spend.xlsx</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 p-6 bg-white border border-slate-100 rounded-[2rem] shadow-xl md:col-span-2 hover:scale-105 transition-transform duration-500">
                        <div class="w-12 h-12 rounded-2xl bg-orange-50 text-orange-500 flex items-center justify-center shadow-sm"><i data-lucide="presentation" class="w-6 h-6"></i></div>
                        <div class="flex-1">
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-tighter mb-0.5">Presentation</p>
                            <div class="font-bold text-slate-800 text-sm">Brand_Strategy_V2.pptx</div>
                        </div>
                        <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">Cross-linked</div>
                    </div>
                </div>`;
            }
            // 8 & 9: Dog Results
            else if (heroStep === 8 || heroStep === 9) {
                html = `
                <div class="grid grid-cols-3 gap-6 w-full animate-in zoom-in-95 duration-700 px-4">
                    ${[4,5,6].map(i=>`
                        <div class="aspect-square rounded-[2rem] overflow-hidden shadow-2xl border-4 border-white transform hover:scale-105 transition-transform">
                            <img src="https://images.unsplash.com/photo-${1552053831+i}?auto=format&fit=crop&w=400" class="w-full h-full object-cover">
                        </div>`).join('')}
                </div>`;
            }


            displayArea.innerHTML = html;
            lucide.createIcons();
        }
       
        setInterval(() => {
            heroStep = (heroStep + 1) % 10;
            renderHero();
        }, 3500);


        window.onload = () => {
            lucide.createIcons();
            renderHero();
        };
    </script>
</body>
</html>
